add_newline = true

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration
$character
"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
disabled = false
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[$duration]($style) "

[username]
show_always = false
style_user = "bold green"

[hostname]
ssh_only = true
style = "bold blue"
