name: Package Availability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package-availability:
    name: Package Availability
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync pacman
        run: pacman -Sy --noconfirm
      - name: Install git
        run: pacman -S --noconfirm git
      - name: Check core packages exist in pacman
        run: |
          fail=0
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg in pacman"
            else
              echo "  WARN: $pkg not in pacman (may be AUR)"
            fi
          done < .config/yadm/packages/core.txt

  brew-check:
    name: Package Availability (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check brew packages exist
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            pkg=$(echo "$line" | awk '{print $2}')
            if brew info "$pkg" &>/dev/null; then
              echo "  ok: brew $pkg"
            else
              echo "  WARN: brew $pkg not found"
            fi
          done < <(grep "^brew " .Brewfile 2>/dev/null || echo "# no brews")
