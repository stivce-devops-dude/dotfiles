name: Test dotfiles

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Lint — syntax check all shell scripts
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pacman -Sy --noconfirm --needed bash zsh
      - name: bash -n bootstrap scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find .config/yadm -type f \( -name "bootstrap*" -o -path "*/bootstrap.d/*" \) -print0)
          [ "$fail" -eq 0 ] || exit 1
      - name: zsh -n all .zsh files
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            zsh -n "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find . -not -path './.git/*' -name "*.zsh" -print0)
          [ "$fail" -eq 0 ] || exit 1
      - name: Validate TOML (starship)
        run: |
          pacman -Sy --noconfirm --needed python3 python-toml
          python3 -c "import toml; toml.load('.config/starship/starship.toml')" && echo "  ok: starship.toml"
      - name: Validate packages exist in pacman
        run: |
          fail=0
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg in pacman"
            else
              echo "  FAIL: $pkg NOT in pacman"
              fail=1
            fi
          done < .config/yadm/packages/core.txt
          [ "$fail" -eq 0 ] || exit 1
      - name: Validate gitconfig
        run: |
          git config -f .gitconfig --list && echo "  ok: gitconfig valid" || { echo "  FAIL: gitconfig invalid"; exit 1; }

  # -------------------------------------------------------------------------
  # Bootstrap test
  # -------------------------------------------------------------------------
  bootstrap:
    name: Bootstrap (dry-run)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yadm
        run: pacman -Sy --noconfirm --needed yadm
      - name: Setup git
        run: |
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
      - name: Test bootstrap detects OS
        run: |
          chmod +x .config/yadm/bootstrap
          ./.config/yadm/bootstrap --dry-run 2>/dev/null || echo "  info: bootstrap needs OS repo to exist"

  # -------------------------------------------------------------------------
  # Arch Linux
  # -------------------------------------------------------------------------
  test-arch:
    name: Test (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pacman -Sy --noconfirm --needed zsh fzf starship neovim git
      - name: Deploy dotfiles
        run: |
          chmod +x ci/deploy-dotfiles.sh
          ci/deploy-dotfiles.sh linux-arch
      - name: Generate fzf integration
        run: |
          if fzf --zsh >/dev/null 2>&1; then fzf --zsh > "$HOME/.fzf.zsh"
          else touch "$HOME/.fzf.zsh"; fi
      - name: Test starship config
        run: |
          starship help >/dev/null 2>&1 && echo "  ok: starship binary works" || { echo "  FAIL: starship"; exit 1; }
      - name: Validate core packages installable
        run: |
          fail=0
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg available"
            else
              echo "  WARN: $pkg not in pacman (may be AUR)"
            fi
          done < .config/yadm/packages/core.txt
      - name: Test kitty config
        run: |
          kitty +runpy "from kitty.config import parse_config; parse_config('$PWD/.config/kitty/kitty.conf')" 2>/dev/null && echo "  ok: kitty config" || echo "  warn: kitty config validation skipped"
      - name: Run tests
        run: zsh ci/test-zshrc.zsh

  # -------------------------------------------------------------------------
  # Ubuntu
  # -------------------------------------------------------------------------
  test-ubuntu:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends zsh fzf git curl neovim ca-certificates
          curl -fsSL https://starship.rs/install.sh | sh -s -- --yes --bin-dir /usr/local/bin
      - name: Deploy dotfiles
        run: |
          chmod +x ci/deploy-dotfiles.sh
          ci/deploy-dotfiles.sh linux-ubuntu
      - name: Generate fzf integration
        run: |
          if fzf --zsh >/dev/null 2>&1; then fzf --zsh > "$HOME/.fzf.zsh"
          else touch "$HOME/.fzf.zsh"; fi
      - name: Test starship config
        run: |
          starship help >/dev/null 2>&1 && echo "  ok: starship binary works" || { echo "  FAIL: starship"; exit 1; }
      - name: Run tests
        run: zsh ci/test-zshrc.zsh

  # -------------------------------------------------------------------------
  # macOS
  # -------------------------------------------------------------------------
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install fzf starship neovim || true
      - name: Deploy dotfiles
        run: |
          chmod +x ci/deploy-dotfiles.sh
          ci/deploy-dotfiles.sh macos
      - name: Generate fzf integration
        run: |
          if fzf --zsh >/dev/null 2>&1; then fzf --zsh > "$HOME/.fzf.zsh"
          else touch "$HOME/.fzf.zsh"; fi
      - name: Test starship config
        run: |
          starship help >/dev/null 2>&1 && echo "  ok: starship binary works" || { echo "  FAIL: starship"; exit 1; }
      - name: Validate core packages installable via brew
        run: |
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            if brew info "$pkg" &>/dev/null; then
              echo "  ok: $pkg available"
            else
              echo "  WARN: $pkg not in brew"
            fi
          done < .config/yadm/packages/core.txt
      - name: Run tests
        run: zsh ci/test-zshrc.zsh
